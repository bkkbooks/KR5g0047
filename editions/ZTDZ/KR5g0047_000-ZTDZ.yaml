body:
  text: 序次經法第一淳古事少法或不多轉久稍澆科戒逓出隨病與藥輕重不同方術彌積條律漸繁世運使然不可頓革至德聖師隨宜宣行既道忌滋章理貴簡要要略非凡所明繁滋非愚所瞻愚智可得相關繁簡必須折衷衷在得正正在無邪邪正了解解在兼通通則得道道則無滯滯少誚多執多譏少皆非通人悉事道體務思此意必感神明神明開道必登勝域今撰正文傳授十卷並見眞經同出聖口見善勤行無所致惑昔尹子初受大字三篇中經在太清部中所以付上下兩卷漢文精感眞人降迹得此章句所滯即通登於金華友諸天人隱注云讀河上一章則徹太上玉京諸天仙人义手稱善傳聲三界魔王禮於空中酆都執敬稽首於法師人生多滯章句能通故次於大字係師得道化道西蜀蜀風淺未未曉深言託遘想爾以訓初廻初廻之倫多同蜀淺辭說切近因物賦通三品要戒濟衆大航故次於河上河上想爾注解巳自有殊大字文體意況亦復有異皆縁時所須轉訓成義舛文同歸隨分所及值兼則兼通值偏則偏解偏解終還於兼未還愼莫譏誚譏誚招愆生死受苦離苦昇樂由於周通周通路逺未即了然直能修此不訶於彼便爲上善善之上者華素兩弘虚實備解乃㑹眞源若乃時綺則言華世素則辭質或激素以華或勵華以素或前約後繁先與後奪或初多終少始徃末歸大巧若拙未易可蚩正言若反豈伊可詰但勇猛思惟以期兼解志徹玉京不患不通通乎大道此爲其最存思有法授受有科朝禮齋請悉有儀制究此十卷自足兼通未暢之間精求悉備救未能精方須因盛但篤盛因必獲妙果妙果有期不假他尋果期未至且覽衆篇至於首引内解别次在後餘力觀之幸亦無妨要所留心其目如左太玄部卷第一老君大字本道經上太玄部卷第二老君大字本德經下太玄部卷第三老君道經上道經下河上公章句太玄部卷第四老君德經上德經下河上公章句太玄部卷第五老君道經上想爾詶太玄部卷第六老君德經下想爾訓太玄部巻第七老君思神圖注訣太玄部卷第八老君傳授經戒儀注訣太玄部卷第九老君自然朝儀注訣太玄部卷第十老君自然齋儀右十巻授經之日師料付之受經之時勿妄請問于時天地水官十方職局三界内外一切神司並共監臨察人善惡舉止云爲唯盡恭肅愼勿推遷更相詰却有所窒礙事竟諮審師爲解說分明語之脫有忘漏即㝷經科依按本文勿妄增損不可攺易參差前後謬濫甲非護短迷誤衆生彼此相牽淪陷荼毒一失福路求還諒難巨石墜海望出豈易罪苦可畏務宜防之精加詳謹幽顯取知無相欺罔違負人神能如是者必俱成眞但妙義要訣多在口中口中所說經之所包文苑事深須口辯覈覈實副經不得越典一時所須或出他部墳籍難遭搜㝷叵得此儀總略綱紀宗源智者思之過不啻半矣傳授齋法第二傳授之重聖賢所崇吉人君子尊之必齋齋洪豐儉隨時施設大法清虚簡素爲上長齋者愚賢應傳啓告而付若服餌巳同心齊久立服勤師門並不須别更建齋齊同志保證相成多賢起發功德易就獨學孤陋階道難昇縁未備㑹良無其人師資對齋宜加精思深勝傍賛也若在世間行教習學授受之人先共對齋乃是共修精解入神非指二人對靜而巳當延請師之朋友門徒眷屬男女多少隨所能供多乃至無數法限三十八人少不可減六人六人爲通齋官備足一人爲師五人爲保保者何也寳也荷也次曰明也證也度也成也相重如寳任荷可教明其誠丹證其業善度其試難成其至眞若山居澗處則對景斷金窮地單寡二三隨時必是同志不可異人或生參差破壞善事師與弟子精共詳宜齋法九日七日五日三日勿啓一曰啓一日者㑹而非齋散財飯賢謂之爲㑹文書啓告請監㑹官凡一日齋拘渉三日也請師保法第二受道營齋用王相之日本命甲子朔望皆佳事辦須速亦得弗擇然延請師保其應充者善㑹難諧乖闌易致彌須注心祈賢降德指日投䟽依如常儀所請之人次第知左第一曰三師以三人爲之其一人爲正師一人爲監度師一人爲證盟師第二曰五保以五人爲都講第三曰六明以六人爲監齋第四曰七證以七人爲侍經第五曰八度以八人爲侍香第六曰九成以九人爲侍燈右六品三十八人不能備者多少隨縁皆是師之同學髙德親知或神智滿足俊彦英才同爲署辭更相奬勸敬之如師號曰尊人奉獻巾刀以期拂拭塵垢斷割纏縳解釋煩惱之羅破除障滯之網義存解脫逍遥淨明淺識未學勿叨此次可得預齋暫兼保證不得署辭勿受巾刀之獻自依齋官當常流之䞋耳書經法第四凡一齋之限三曰之中繕寫經書未悉備得先起戒文朝儀爲次在師門者亦得逆書積漸取辦不必齋時齋時力少可得借人借人難得不齋之時受法之後徐覓能書清嚴道士敬信之人别住靜宻觸物精新自就師請經卷卷皆拜受竟又拜送恭肅兢兢所受部屬悉應寫之皆用縑素抄之則紙充乃應師手書一通以授弟子弟子手書一通以奉師宗功既難就或拙秉毫許得雇借精校分明愼勿漏誤誤則奪年筭遭災禍其罰深重五校十校講習相符玄神祐人延壽成聖恩濟一切非特巳身受是經戒各治二通一通常鎭柏函盛之架以局案置髙座近前亦可别臺封之不可妄開若應暴曬齋淨岀之竟又宻藏愼勿泄露一通常隨齋請思議誦習簡素及紙潢染裝嚴首目帶軸祑藴巾箱皆令貞潔不得雜他自非同志愼勿假借竊寫盜取其罪尤深朽故更起𡚁者沈淵或納幽洞不則淨之去失首悔立功受寫後師異法使焚勿從即得道亦不可也有不解了且存供養先師盟誓不可負違萬師一心超三界也書表法第五黃素二尺五寸言辭多少隨時取足朱界朱書書如章法能四分二十四則益善言三清玉皇天尊夫上此四號皆懸一字餘號悉不須懸重字不得㸃死罪不得露重名不得乖又不得露量度上下使踈概相容言尊極處去下二寸皆上上去下三寸依法隔一字拜字下一寸猶容奏字奏字懸之逼下則上上三分九行一如章法亦名爲章三師行紙章悉以素爲表無表亦可用紙章表可手言也書三師諱法第六某年太歲某某月朔日某子某郡縣郷里男女弟子姓名年若干歲某於某州郡縣郷里某山舘宅舍受道德五千文三品要戒三師姓諱如左度師某州郡縣郷里男女官道士先生姓某諱某午如干歲字某籍師某州郡縣郷里男女官道士先生姓某諱某午如干歲字某經師某州郡縣郷里男女官道士光生姓某諱某年若干歲字某右墨書黃素五寸辦信物法弟七白紋五文太極眞人曰五千文仙人傳授之科素與靈寳同限髙才至士好諷誦求自然飛仙之道者具法信紋繒五十尺與靈寳一時於名山齋受若縁運未遇靈寳自可直受道徳經文於家清齋不必山林辦信證心其有三一者捨財就道漸染勝風二者因物取訓渉解入宗三者校有練無棄礙取通所以用紋崇象玄迹五十其尺理數依分分明正理窮數盡玄有無既暢勝境斯登逍遥長存道俗成濟矣凡門内門外弟子不同不同而同同而又異或有在外而勤或有在内而惰惰則雖數而踈勤則雖踈而親親仁育德異同在兹勤者不假物以明心惰者宜因信以督志惰而不滯乎財勤而未能遣物或有縁而貧或富須奬勵師友親朋幸有代出依法施散廣勸立功賛揚成義斯德益深若窮地無紋他物準當當時窘闕從隨補充淡然追道安貧從師重賢忘物亦可都無所須直啓吿而授明匠自詳衷焉授度所須物法第八青絲一繩八條合之整長九尺金鈕一枚俓一寸無一寸者可用常鐶大小無定科但令是眞金耳刀子碪槌各一枚碪槌檀柘金荆堅木作之刀子中適足以破鈕紙筆線紙以褁鐶鈕線以纏縛之筆題外記年月日姓名云五千文鈕朱墨隨人丹水具朱一兩先磨研一垍椀中令熟相和乃度一勝椀中厚薄調適過半盛之手巾刀子隨師保多少人各一中一刀也右六件皆令新淨不侵公私悉當預備不得臨時更相煎切稽廢天儀賔主招咎悔謝無及先勞後逸無憚初煩明友相成更相賛助共思詳量務充法用衣服法第九衣者身之章也道俗不可混雜若出家超世一通而巳至於陸通散髮徒跣倮形有之與無弗拘限制其渉世居家又不得過三通通過三者急以施人積而能散轉僞成眞眞人建學修身率衆應須兩通常令新淨故隨布施施與法人人非法者不得充用穢辱眞正深宜防之良無其人火淨如法非唯衣服爰及屋宇牀席幃帳屐履被氈褥食器書䟽觸物堪施則施人不堪則浄巾帽服飾袴衫裙𥜗行縢臂衣事事各二其一分别異室安處法事則著事竟脫之别箱各篋内外不參毎使香潔齊整副稱大小厚薄布絹隨時富不得奢靡貧不得穢陋調和中適依按師儀受法之初便應令備貧未悉具浣濯中延要服所須大略如左葛巾單衣被履手板右五件皆應新淨勿用故敗老君去周左慈在魏並葛巾單衣不著褐也故自天子至于庶人同用此儀披褐懷玉隨人所辦女子佳𧟌黃裳烏履不得金玉錦綉裝嚴詣師投辭法第十凡受妙法皆詣師門不得屈尊曲從鄙舍若遊行法師延請隨時來學則志篤徃教則業輕得心忘迹者稀所以深宜防愼齋必經日者師徒相許論序科儀供辦法物足以申意未齋之前久得研詳師徒脫有緩急齋日或少或多三時六時隨人所辦初集之夕依法投辭書治禮拜具在自然儀中辭之消息増損隨時准擬舊文古本如左此本是四皓所傳與自然訣所載不同樂先生用之宜與自然訣相參取衷三洞法師某岳先生某治某氣其道士如干籙生某州郡縣郷里奉道男女民生弟子臣妾小兆姓名如干嵗某歲生某月某日時建生今住居某州郡縣郷里某宫第府廨舘舍山鎭中歸命死罪乞道辭積善之因世崇玄化得見三寳踊躍歡欣不揆下愚逺慕上學竊聞道德五千文淵奥遐邈仰希禀受以遂至心謹依法齎信清齋奉辭伏願法師賜垂成就謹辭詣太上髙玄大法師某先生門下太歲某某月日時於某州郡縣郷里山奉辭齋儀増損法第十一受道法齋雖依自然儀宿啓及三上香十方及大懴文當隨事増損師若未嘗受籙治氣不參齋不出官竟不言功言功之體首謝不及又云受徃事竟還臣身中此則操復在事竟之後齋初不得即復而出官末云功曹使者飛龍騎吏列啓事竟各還臣身此是宣傳營齋之意事竟即還不關白衛齋所諸官齋所諸官侍齋畢度事都竟乃言功而復若不出官止出入宻祝發復香爐關啓請願餘儀悉同齋竟奏表法第十二授經之時當取齋限之後平旦朝禮行道竟未可言功復爐三時則其朝應朝六時則其朝行道初齋出官後則末可言功不岀官者則未可復爐也師仍向北更三捻香捻香竟還東伏仍小坐齋官五保猶向西同小坐受經之身就師之南向北而伏女伏亦同師鳴鼓三十六通讀表如左此是堂中之法若出壇墠師應向北男弟子伏左向柬女弟子伏右向西不得與師同例壇去堂逺百歩以來出官齋者皆於堂中言功復爐至於登壇重復出官師無治籙亦不出官不出官者入祝發爐直捻香仍向北小坐鳴鼓讀表壇在百歩内者朝及行道皆可登壇如在齋堂之儀唯讀表向北若解壇之日朝行道竟即出更有他事或缺少未解公私廻換可待日中朝竟依如具法入堂或壇悉依朝行事或朝遇風雨先於堂中朝及行道如法出後時晴或晚須靜登壇入祝發爐仍出官奏表自非正者皆不須朝只發爐出官操如章法付受都竟然後復官不出官者則無操復既對齋啓告自不假岀官須事都竟復爐而岀若平旦登壇未得朝禮行道未竟而風雨驚災害告退之後守靜行事如此則朝亦脯行道朝畢讀表文也表本法第十三三洞法師某岳先生奉行道德五千文事臣姓名三皇號洞神靈寳號洞玄玉清號洞眞受此者稱三洞未受者直云太上道德法師受道之後爲師度弟子數滿則師表奏申言功德乃得爲師如此則稱法師未如此者不得爲人師若爲齋主則只云三寳弟子不得云法師三洞偏也有受則云弟子奉行五千文事未受不得輙稱若受老君及一洞二洞至於三洞之時云太上道德法師奉行三洞某事男稱臣女稱妾女子在家有許笄之期及其出嫁有婦妾之異至於自稱皆同云妾妾者何也接也捷也動事尊人供奉使命扶接捷速不得淹留優游怠惰則乖正道若在家學法未經嫁聘皆稱女生不受籙者皆云弟子並稱本父姓嫁爲妻者皆稱夫姓夫捨之者還取本姓妾不得禮君是以不取主姓夫亡之後婦方受道不得自絶於夫猶稱夫姓或有重嫁以後爲正若未參受及巳有所參後脫改姓及君上賜族皆啓奏大道然後稱之前諸文書不須追改正後所受三官自知巳經啓奏旦諮事源頒下三官不患妄誤後治文書不須重陳年息夾注之煩以申專一之志女子受法堪爲人師所稱法師先生畧與男同至於元君夫人諸號各異但先生之號以標髙勝德在人先長在不滅故曰先生不可自目依如五嶽參染積年德潤於時幽顯所貴師友共奏加號先生生年所屬治嶽相連若神通妙達教化諸方不必附嶽殊號特隆遊玄玄暢逺遊遊嶽弘道道德通眞眞隱髙上無爲無上正一此十二號號中之髙諸迹功行隨時立名億萬稱號不可具陳自非師友所薦不得妄自稱也稽首再拜上言拜畢起又長跪讀上啓太上至讀辭可小坐訖後起拜也上言太上無極至眞無上無爲大道髙聖玄靈九天明王玉皇上帝三十九眞上靈三十二天玄神八十一君三十六天帝三十六土皇萬仙道君監靈使者侍仙玉郎領眞監聖侍經眞官大羅妙主應感眞精十方巳得道無量大聖衆三界内外一切神明臣以有幸生值是眞禀受經戒夙夜遵行讃揚妙化濟度天人才輕任重慙懼但深仰怙大道慈奬必周竭心盡力誓弘匪懈因縁所見敢不申謄今有取辭詞言懇款志願翹勤臣不勝見其元元之至謹以表啓聞臣昔之從師某先生姓名以某年月日時於某處禀受道德尊經戒律科儀某遇賢則付某今廻向庶允玄期奉受之後約如盟文誓身九天必能遵脩檢愼閉口存神念眞少私寡欲以今神仙按法年限六四之間五八大數逢有賢人依科上啓通達九天誠信備法然後而傳不得輕泄妄示俗人上告萬靈下告五嶽三河九源啓使知聞普為明證成就功業違盟愆信七世同淪某受經者名長充下鬼左右官之考循履刀山流曳鋒劒之樹食火啖炭抱鐵入湯徃反二十四獄塗苦億萬劫年甘分煩惱不敢有怨如法積善九玄俱昇某受經者名智慧通達壽命延長昇仙成聖爲天人師眷屬受慶一切荷恩謹以表啓聞伏須告報臣某誠惶誠恐稽首再拜以聞奏仍再拜竟長跪讀後文臣姓某屬某州郡縣太上無形無名虚無至眞大道無上元尊金闕七寳玉陛下太歲某年某月朔某日某時於某州某縣某郷某里巾上奏傳授經戒儀注訣終
