front:
  text: 傳授經戒儀注訣楹十一師曰老君者得道之大聖幽顯所共師者也應感則變化隨方功成則隱淪常住住無所住常無不在不在之在在乎無極無極之極極乎太玄太玄者大宗極主之所都也小宗未極之主相導歸乎此都此都無際包羅畢周最大無比故謂爲太有而難見故謂爲玄凡眼雖不能覩慧目廼能覿之研習經文施行善事存念宗主不忘須㬰主本無名標曰太上應感爰臻得斯目慧慧目之果由於良因因由明師師道不二經又一同同乎道德道德之極主三合之所成成一之尊住太玄之都化應十方敷有無之妙妙極在老老爲宗師師體周帀道成特髙故曰太玄髙上老君積學輪轉位登聖眞應接無窮不可稱述近世出化生乎商時降迹和光誕於庶類示明胎育可以學眞雖居下界無累得道厥毋逍遥李樹之間思聞清風以祛塵迹玉姿輝然儵爾挺質無坼無副二體一和遂因李爲姓以耳爲名居於楚國苦縣瀬郷曲仁里中周流六虚教化三界出世間法在世間法有爲無爲莫不畢究文王之時仕爲守藏史或出或處二百餘載至昭王二十四年太歲癸丑十二月二十八日爲關令尹先生說五千文文出無始說亦無窮藏明隱晦智反流源慈㫖應感或顯或幽宣行一切傳者不同各從縁解愼勿相非但勤精思謹憶所知久習神降授以要言自然玄鏡洞達智慧之源也經戒儀法者凡二十四條輔成三乗上中下品共所宜用中人巳下末略多違中人巳上勤行無替無替由於志堅勇猛遂能兼濟此大乗之才智士之所慕者也識淺惰弱弗辦興功所進寡薄墜則難歸中小之乗其業巳劣況于凡下寧可爲儔髙慮達人務弘妙法超三界之外與上聖爲倫矣
