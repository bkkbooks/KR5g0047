front:
  text: 傳授經戒儀注訣楹十一師曰老君者得道之大聖幽顯所共師者也應感則變化隨方功成則隱淪常住住無所住常無不在不在之在在乎無極無極之極極乎太玄太玄者大宗極主之所都也小宗未極之主相導歸乎此都此都無際包羅畢周最大無比故謂為太有而難見故謂為玄凡眼雖不能覩慧目乃能覿之研習經文施行善事存念宗主不忘須臾主本無名標曰太上應感爰臻得斯目慧慧目之果由於良因因由明師師道不二經又一同同乎道德道德之極主三合之所成成一之尊住太玄之都化應十方敷有無之妙妙極在老老為宗師師體周匝道成特髙故曰太玄髙上老君積學輪轉位登聖真應接無窮不可稱述近世出化生乎商時降迹和光誕於庶類示明胎育可以學真雖居下界無纍得道厥毋逍遙李樹之間思聞清風以祛塵迹玉姿輝然倏爾挺質無坼無副二體一和遂因李為姓以耳為名居於楚國苦縣瀨鄉曲仁里中周流六虛教化三界出世間法在世間法有為無為莫不畢究文王之時仕為守藏史或出或處二百餘載至昭王二十四年太歲癸丑十二月二十八日為關令尹先生説五千文文出無始説亦無窮藏明隱晦智反流源慈旨應感或顯或幽宣行一切傳者不同各從緣解愼勿相非但勤精思謹憶所知久習神降授以要言自然玄鏡洞達智慧之源也經戒儀法者凡二十四條輔成三乘上中下品共所宜用中人巳下末略多違中人巳上勤行無替無替由於志堅勇猛遂能兼濟此大乘之才智士之所慕者也識淺惰弱弗辦興功所進寡薄墜則難歸中小之乘其業巳劣況于凡下寧可為儔髙慮達人務弘妙法超三界之外與上聖為倫矣
